name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --group dev
      - run: uv run ruff check core tools tests agents demo
      - run: uv run pytest -m "not integration" -q

  integration:
    runs-on: ubuntu-latest
    services:
      rabbitmq:
        image: rabbitmq:4.1.8-management
        env:
          RABBITMQ_DEFAULT_USER: agentarium
          RABBITMQ_DEFAULT_PASS: agentarium
        ports: ["5672:5672", "15672:15672"]
        options: >-
          --health-cmd "rabbitmq-diagnostics -q check_port_connectivity"
          --health-interval 10s --health-timeout 5s --health-retries 10
      postgres:
        image: postgres:16.10
        env:
          POSTGRES_USER: agentarium
          POSTGRES_PASSWORD: agentarium
          POSTGRES_DB: agentarium
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U agentarium"
          --health-interval 10s --health-timeout 5s --health-retries 10
      qdrant:
        image: qdrant/qdrant:v1.18.3
        ports: ["6333:6333"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --group dev
      # target-db («пациент») нельзя поднять сервис-контейнером: ему нужны init-скрипты из репо
      # (роли, схема billing, гранты), а services стартуют до checkout. Поднимаем шагом после
      # checkout — тот же образ, порт и init-путь, что в docker-compose.yml.
      - name: target-db c init-скриптами
        run: |
          docker run -d --name target-db \
            -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=pacient -e POSTGRES_DB=billing \
            -p 5434:5432 \
            -v "$GITHUB_WORKSPACE/infra/target-db/init":/docker-entrypoint-initdb.d:ro \
            postgres:16.10
          for i in $(seq 1 60); do
            docker exec target-db pg_isready -U postgres -d billing >/dev/null 2>&1 && exit 0
            sleep 2
          done
          echo "target-db не поднялся"; docker logs target-db; exit 1
      # Тесты, которым нужен живой Ollama (bge-m3, ~1.2 ГБ) или GigaChat (e2e), гейтятся
      # graceful-skip'ом внутри самих тестов — в CI без них они пропускаются, остальная
      # интеграция бежит на сервис-контейнерах брокера, Postgres, Qdrant и target-db.
      - run: uv run pytest -m integration -q
        env:
          RABBITMQ_URL: amqp://agentarium:agentarium@localhost:5672/
          POSTGRES_DSN: postgresql://agentarium:agentarium@localhost:5433/agentarium
          QDRANT_URL: http://localhost:6333
          TARGET_DB_DSN: postgresql://readonly_executor:readonly@localhost:5434/billing
