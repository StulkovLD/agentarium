name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --group dev
      - run: uv run ruff check core tools tests agents
      - run: uv run pytest -m "not integration" -q
  # Интеграционный ярус (services: rabbitmq/postgres/qdrant) подключается слайсами S2/S5 — spec/70.
