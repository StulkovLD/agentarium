# Статичная инфраструктура платформы: шина RabbitMQ, трейсы Jaeger, склады Postgres + Qdrant.
# Владельцы: шина — spec/40/50; склады — spec/45. target-db («пациент» PoC) приходит в S7, не здесь.
# Одной командой: docker compose up -d --wait rabbitmq postgres qdrant
services:
  rabbitmq:
    image: rabbitmq:4.1.8-management   # ветка 4.x + management-плагин; патч запинен — проверенный тег (spec/05)
    container_name: agentarium-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: agentarium   # совпадает с env.example (RABBITMQ_URL)
      RABBITMQ_DEFAULT_PASS: agentarium
    ports:
      - "5672:5672"     # AMQP — шина
      - "15672:15672"   # management UI + HTTP API (smoke-сверка аргументов очередей, spec/40)
    healthcheck:
      # check_port_connectivity — узел загружен и слушатели принимают соединения; --wait ждёт именно этого
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    volumes:
      # durable-стор quorum-очередей: перезапуск брокера не съедает конверты (слой «Публикация», spec/50)
      - rabbitmq-data:/var/lib/rabbitmq

  jaeger:
    image: jaegertracing/all-in-one:1.62.0   # all-in-one с пином патча — воспроизводимый водопад (spec/50)
    container_name: agentarium-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"   # приём OTLP на 4317 (gRPC) и 4318 (HTTP) — SDK шлёт по gRPC
    ports:
      - "16686:16686"   # web-UI: путь заявки через агентов виден как водопад, поиск по trace_id
      - "4317:4317"     # OTLP gRPC — цель OTEL_EXPORTER_OTLP_ENDPOINT агентов (env.example)
    healthcheck:
      # 14269 — admin-порт коллектора: `{"status":"Server available"}`, когда приём телеметрии готов
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:14269/"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  postgres:
    image: postgres:16.10   # PostgreSQL 16 (spec/05); патч запинен — воспроизводимая миграция
    container_name: agentarium-postgres
    environment:
      POSTGRES_USER: agentarium       # совпадает с env.example (POSTGRES_DSN)
      POSTGRES_PASSWORD: agentarium
      POSTGRES_DB: agentarium
    ports:
      - "5433:5432"   # наружу 5433: не претендуем на дефолтный порт — у разработчиков часто живёт свой postgres
    healthcheck:
      # pg_isready — узел принимает соединения; --wait ждёт именно этого до старта агентов/шлюза
      test: ["CMD-SHELL", "pg_isready -U agentarium -d agentarium"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped
    volumes:
      # durable-стор заявок: перезапуск Postgres не съедает историю requests (spec/45)
      - postgres-data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.18.3   # склад векторов (spec/05); версия запинена — major.minor совпадает с qdrant-client (иначе клиент ругается на несовместимость)
    container_name: agentarium-qdrant
    ports:
      - "6333:6333"   # REST + dashboard: паспорт коллекции точкой id=0, поиск знаний (spec/45)
      - "6334:6334"   # gRPC — быстрый путь клиента qdrant-client
    healthcheck:
      # в образе есть bash, нет curl/wget: TCP-connect на 6333 — порт открыт только когда узел готов
      test: ["CMD-SHELL", "bash -c ': > /dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped
    volumes:
      # durable-стор коллекций: перезапуск Qdrant не требует переиндексации знаний (spec/45)
      - qdrant-data:/qdrant/storage

  target-db:
    image: postgres:16.10   # PoC-«пациент», которого сопровождает система (spec/55); пин патча как у складов (spec/05)
    container_name: agentarium-target-db
    environment:
      POSTGRES_USER: postgres         # суперюзер-обслуживание пациента; исполнитель ходит под readonly_executor
      POSTGRES_PASSWORD: pacient
      POSTGRES_DB: billing            # база-пациент; init-скрипты наполняют её ролями и данными
    ports:
      - "5434:5432"   # наружу 5434: не конфликтуем ни с хост-postgres (5432), ни со складом состояния (5433)
    volumes:
      # init-скрипты выполняются один раз на пустом томе: роли, схема billing, данные, гранты (spec/55)
      - ./infra/target-db/init:/docker-entrypoint-initdb.d:ro
      # durable-том пациента; для повторной инициализации с нуля — docker compose down -v target-db
      - target-db-data:/var/lib/postgresql/data
    healthcheck:
      # healthy только после отработки init-скриптов (TCP поднимается последним) — под это ждёт --wait
      test: ["CMD-SHELL", "pg_isready -U postgres -d billing"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

volumes:
  rabbitmq-data:
  postgres-data:
  qdrant-data:
  target-db-data:
