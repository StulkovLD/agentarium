# agents/catalog.yaml — владелец знания «какие типы существуют и каковы их контракты» (spec/40).
# Ядро не импортирует код агентов (они в других образах) — каталог их машиночитаемое лицо.
# Тривиальные echo/reverse (S3) + dba-типы parser/rag/executor (S7) + auditor (S8, конфигурация B).

echo:
  build: agents/echo
  consumes: [echo.request]
  produces: [echo.done]
  config_schema: {}          # тривиальный тип: конфиг не нужен

reverse:
  build: agents/reverse
  consumes: [echo.done]
  produces: [reverse.done]
  config_schema: {}

parser:
  build: agents/parser
  consumes: [request.new]
  produces: [request.parsed, request.rejected]
  config_schema: { model: llm }

rag:
  build: agents/rag
  consumes: [request.parsed]
  produces: [knowledge.found]
  config_schema: { model: llm, collection: str }

executor:
  build: agents/executor
  consumes: [knowledge.found]
  produces: [plan.ready]
  config_schema: { model: llm, target_db: dsn }

auditor:                       # конфигурация B (spec/55): план → сверка с историей инцидентов
  build: agents/auditor
  consumes: [plan.ready]
  produces: [audit.done]
  config_schema: { model: llm, collection: str }
